<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GZ Teixeira Advocacia | Gilson Zorzetti</title>
    <style>
        /* Estilos Globais focados em Mobile-First */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #121212;
            color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        /* Container Principal imitando um cartão de visita vertical */
        .card-container {
            width: 100%;
            max-width: 400px;
            background: linear-gradient(135deg, #1a1a1a 0%, #222222 100%);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(212, 175, 55, 0.2);
            padding: 30px 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        /* Detalhe elegante em dourado no topo */
        .card-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: linear-gradient(90deg, #b38f46, #d4af37, #f3e5ab);
        }

        /* Estilização do Logo baseado na imagem */
        .logo-section {
            margin-bottom: 25px;
        }

        .logo-symbol {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 2px solid #d4af37;
            margin: 0 auto 15px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #2a2a2a 0%, #151515 100%);
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.1);
        }

        /* Ícone minimalista da balança da justiça em SVG */
        .logo-symbol svg {
            width: 50px;
            height: 50px;
            fill: #d4af37;
        }

        .brand-header {
            font-size: 14px;
            letter-spacing: 3px;
            color: #d4af37;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .main-name {
            font-size: 26px;
            font-weight: 700;
            color: #ffffff;
            line-height: 1.2;
        }

        .main-name span {
            color: #d4af37;
            display: block;
            font-size: 22px;
            font-weight: 400;
            margin-top: 2px;
        }

        .sub-badge {
            display: inline-block;
            font-size: 11px;
            color: #a0a0a0;
            letter-spacing: 1px;
            margin-top: 5px;
            text-transform: uppercase;
        }

        /* Divisor elegante */
        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.4), transparent);
            margin: 20px 0;
        }

        /* Seção de Informações de Contato e Endereço */
        .info-section {
            margin-bottom: 30px;
            text-align: left;
            padding: 0 10px;
        }

        .info-item {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            font-size: 14px;
            color: #e0e0e0;
        }

        .info-item strong {
            color: #d4af37;
            margin-right: 6px;
        }

        .info-item a {
            color: #e0e0e0;
            text-decoration: none;
        }

        /* Botão Principal Interativo do WhatsApp */
        .btn-whatsapp {
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #128C7E 0%, #25D366 100%);
            color: #ffffff;
            text-decoration: none;
            padding: 15px 20px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 16px;
            box-shadow: 0 5px 15px rgba(37, 211, 102, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
            border: none;
            cursor: pointer;
            width: 100%;
        }

        .btn-whatsapp:active {
            transform: scale(0.98);
            box-shadow: 0 2px 8px rgba(37, 211, 102, 0.2);
        }

        .btn-whatsapp svg {
            width: 24px;
            height: 24px;
            fill: #ffffff;
            margin-right: 10px;
        }

        /* Rodapé sutil */
        .footer-credit {
            margin-top: 25px;
            font-size: 11px;
            color: #666666;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="card-container">
        <div class="logo-section">
            <div class="brand-header">GZ Teixeira</div>
            <div class="logo-symbol">

                </svg>
            </div>
            <h1 class="main-name">Gilson Zorzetti<span>TEIXEIRA</span></h1>

            </svg>
            Iniciar Atendimento

        <div class="footer-credit">
            © 2026 GZ Teixeira Advocacia
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
